services:
  # ── Infrastructure ─────────────────────────────────────────
  # PostgreSQL — Neon (cloud)
  # Redis     — Upstash (cloud)
  # S3/MinIO  — removed; scripts stored in Postgres draft_script column

  # ── Main Storytelling API ──────────────────────────────────
  main-api:
    build:
      context: ./main
    image: storytelling_main:latest
    restart: unless-stopped
    env_file: ./main/.env
    environment:
      PYTHONPATH: /app
      TTS_SERVICE_URL: http://tts-service:8001
    ports:
      - "8000:8000"

  celery_worker:
    image: storytelling_main:latest
    restart: unless-stopped
    env_file: ./main/.env
    environment:
      PYTHONPATH: /app
    command: >
      celery -A tasks.celery_app worker
      --loglevel=info
      --concurrency=2
    depends_on:
      main-api:
        condition: service_started

  # ── Interactive Narrator (TTS) ────────────────────────────
  tts-service:
    build:
      context: ./tts
    image: storytelling_tts:latest
    restart: unless-stopped
    env_file: ./tts/.env
    ports:
      - "8001:8001"

volumes: {}
