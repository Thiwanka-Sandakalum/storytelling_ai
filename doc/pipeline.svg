<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 1000 980" style="background: #0d1117; font-family: 'Inter', system-ui, -apple-system, sans-serif;">
  <defs>
    <!-- Glow Effects -->
    <filter id="glow-teal" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Gradients -->
    <linearGradient id="grad-teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#0d9488" />
    </linearGradient>
    <linearGradient id="grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <linearGradient id="grad-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <linearGradient id="grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>

    <!-- Arrow Markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#64748b" />
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#0ea5e9" />
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#a855f7" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="30" y="40" fill="#f8fafc" font-size="22" font-weight="700" letter-spacing="-0.025em">15-Node LangGraph State Machine Flow</text>
  <text x="30" y="62" fill="#64748b" font-size="13">Detailed request lifecycle across 6 narrative development phases</text>

  <!-- Phase Labels (Left Side) -->
  <g fill="#475569" font-size="11" font-weight="700" letter-spacing="0.05em">
    <text x="30" y="130">PHASE 1: PLANNING</text>
    <text x="30" y="325">PHASE 2: HITL GATE</text>
    <text x="30" y="500">PHASE 3: GENERATION</text>
    <text x="30" y="615">PHASE 4: COVERAGE</text>
    <text x="30" y="690">PHASE 5: ASSEMBLY</text>
    <text x="30" y="785">PHASE 6: EVALUATION</text>
  </g>

  <!-- Flow Lines (Left boundary lines to indicate phases) -->
  <path d="M 180 110 L 180 880" stroke="#1e293b" stroke-width="2" stroke-dasharray="4 4" />

  <!-- Node: User Query (Start) -->
  <g transform="translate(410, 25)">
    <rect width="180" height="40" rx="20" fill="url(#grad-teal)" stroke="#0ea5e9" stroke-width="1" filter="url(#glow-teal)" />
    <text x="90" y="24" fill="#f8fafc" font-size="12" font-weight="600" text-anchor="middle">User Prompt Input</text>
  </g>

  <!-- Phase 1: Planning Nodes -->
  <!-- plan_story -->
  <g transform="translate(410, 95)">
    <rect width="180" height="45" rx="8" fill="#151f32" stroke="#a855f7" stroke-width="1.5" />
    <text x="90" y="22" fill="#f8fafc" font-size="12" font-weight="600" text-anchor="middle">plan_story</text>
    <text x="90" y="35" fill="#a855f7" font-size="9" font-weight="500" text-anchor="middle">OpenAI GPT-4o</text>
  </g>

  <!-- validate_outline -->
  <g transform="translate(410, 170)">
    <rect width="180" height="45" rx="8" fill="#151f32" stroke="#64748b" stroke-width="1" />
    <text x="90" y="26" fill="#f8fafc" font-size="12" font-weight="600" text-anchor="middle">validate_outline</text>
  </g>

  <!-- validate check diamond -->
  <g transform="translate(470, 240)">
    <path d="M 30 0 L 60 30 L 30 60 L 0 30 Z" fill="#1e293b" stroke="#64748b" stroke-width="1.5" />
    <text x="30" y="34" fill="#94a3b8" font-size="11" font-weight="600" text-anchor="middle">Valid?</text>
  </g>

  <!-- repair_outline -->
  <g transform="translate(680, 170)">
    <rect width="180" height="45" rx="8" fill="#151f32" stroke="#a855f7" stroke-width="1" />
    <text x="90" y="22" fill="#f8fafc" font-size="12" font-weight="600" text-anchor="middle">repair_outline</text>
    <text x="90" y="35" fill="#a855f7" font-size="9" text-anchor="middle">OpenAI GPT-4o</text>
  </g>

  <!-- Phase 2: HITL Approval -->
  <!-- await_approval -->
  <g transform="translate(410, 335)">
    <rect width="180" height="45" rx="8" fill="#151f32" stroke="#0ea5e9" stroke-width="1.5" filter="url(#glow-teal)" />
    <text x="90" y="26" fill="#f8fafc" font-size="12" font-weight="600" text-anchor="middle">await_approval</text>
  </g>

  <!-- generate_cover (Imagen) -->
  <g transform="translate(200, 335)">
    <rect width="160" height="45" rx="8" fill="#151f32" stroke="#3b82f6" stroke-width="1" />
    <text x="80" y="22" fill="#f8fafc" font-size="12" font-weight="600" text-anchor="middle">generate_cover</text>
    <text x="80" y="35" fill="#3b82f6" font-size="9" text-anchor="middle">Vertex AI Imagen</text>
  </g>

  <!-- Phase 3: Parallel Generation (Celery Map-Reduce) -->
  <!-- assign_workers -->
  <g transform="translate(410, 415)">
    <rect width="180" height="45" rx="8" fill="#151f32" stroke="#64748b" stroke-width="1" />
    <text x="90" y="26" fill="#f8fafc" font-size="12" font-weight="600" text-anchor="middle">assign_workers (Map)</text>
  </g>

  <!-- Parallel chapters border box -->
  <g transform="translate(200, 480)">
    <rect width="600" height="95" rx="10" fill="#0f172a" stroke="#a855f7" stroke-width="1" stroke-dasharray="4 4" />
    <text x="15" y="20" fill="#a855f7" font-size="10" font-weight="600">Parallel Fan-Out (Chapter Workers)</text>
    
    <!-- generate_chapter -->
    <g transform="translate(30, 35)">
      <rect width="160" height="45" rx="8" fill="#151f32" stroke="#a855f7" stroke-width="1.5" />
      <text x="80" y="22" fill="#f8fafc" font-size="11" font-weight="600" text-anchor="middle">generate_chapter</text>
      <text x="80" y="35" fill="#a855f7" font-size="9" text-anchor="middle">OpenAI GPT-4o</text>
    </g>

    <!-- validate_chapter -->
    <g transform="translate(220, 35)">
      <rect width="160" height="45" rx="8" fill="#151f32" stroke="#64748b" stroke-width="1" />
      <text x="80" y="26" fill="#f8fafc" font-size="11" font-weight="600" text-anchor="middle">validate_chapter</text>
    </g>

    <!-- repair_chapter -->
    <g transform="translate(410, 35)">
      <rect width="160" height="45" rx="8" fill="#151f32" stroke="#a855f7" stroke-width="1" />
      <text x="80" y="22" fill="#f8fafc" font-size="11" font-weight="600" text-anchor="middle">repair_chapter</text>
      <text x="80" y="35" fill="#a855f7" font-size="9" text-anchor="middle">OpenAI GPT-4o</text>
    </g>
  </g>

  <!-- Phase 4: Coverage Gate -->
  <!-- coverage_gate -->
  <g transform="translate(410, 600)">
    <rect width="180" height="45" rx="8" fill="#151f32" stroke="#64748b" stroke-width="1" />
    <text x="90" y="26" fill="#f8fafc" font-size="12" font-weight="600" text-anchor="middle">coverage_gate (Reduce)</text>
  </g>

  <!-- Phase 5: Assembly -->
  <!-- assemble_story -->
  <g transform="translate(410, 675)">
    <rect width="180" height="45" rx="8" fill="#151f32" stroke="#64748b" stroke-width="1" />
    <text x="90" y="26" fill="#f8fafc" font-size="12" font-weight="600" text-anchor="middle">assemble_story</text>
  </g>

  <!-- Phase 6: Quality Evaluation -->
  <!-- evaluate_story -->
  <g transform="translate(410, 750)">
    <rect width="180" height="45" rx="8" fill="#151f32" stroke="#a855f7" stroke-width="1.5" />
    <text x="90" y="22" fill="#f8fafc" font-size="12" font-weight="600" text-anchor="middle">evaluate_story</text>
    <text x="90" y="35" fill="#a855f7" font-size="9" text-anchor="middle">OpenAI GPT-4o</text>
  </g>

  <!-- quality check diamond -->
  <g transform="translate(470, 820)">
    <path d="M 30 0 L 60 30 L 30 60 L 0 30 Z" fill="#1e293b" stroke="#64748b" stroke-width="1.5" />
    <text x="30" y="34" fill="#94a3b8" font-size="11" font-weight="600" text-anchor="middle">Passed?</text>
  </g>

  <!-- targeted_rewrite -->
  <g transform="translate(680, 750)">
    <rect width="180" height="45" rx="8" fill="#151f32" stroke="#a855f7" stroke-width="1" />
    <text x="90" y="22" fill="#f8fafc" font-size="12" font-weight="600" text-anchor="middle">targeted_rewrite</text>
    <text x="90" y="35" fill="#a855f7" font-size="9" text-anchor="middle">OpenAI GPT-4o</text>
  </g>

  <!-- Final Script Output -->
  <g transform="translate(410, 915)">
    <rect width="180" height="40" rx="20" fill="url(#grad-orange)" stroke="#f97316" stroke-width="1" filter="url(#glow-orange)" />
    <text x="90" y="24" fill="#f8fafc" font-size="12" font-weight="600" text-anchor="middle">Final Narrative Script</text>
  </g>


  <!-- ARROWS & FLOW CONSTRAINTS -->
  <!-- User -> Plan -->
  <path d="M 500 65 L 500 92" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Plan -> Validate -->
  <path d="M 500 140 L 500 167" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Validate -> Diamond -->
  <path d="M 500 215 L 500 237" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Diamond - Fail -->
  <path d="M 530 270 L 672 270 L 672 192 L 677 192" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="560" y="262" fill="#ef4444" font-size="10" font-weight="600">No (Gaps / Invalid)</text>

  <!-- repair to validate -->
  <path d="M 680 192 L 593 192" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Diamond - Pass -->
  <path d="M 500 300 L 500 332" stroke="#0ea5e9" stroke-width="2" marker-end="url(#arrow-teal)" />
  <text x="510" y="318" fill="#0ea5e9" font-size="10" font-weight="600">Yes (Validated)</text>

  <!-- await_approval -> assign_workers -->
  <path d="M 500 380 L 500 412" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- await_approval -> generate_cover (parallel branch) -->
  <path d="M 410 357 L 363 357" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- generate_cover down to output join -->
  <path d="M 280 380 L 280 935 L 407 935" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- assign_workers -> Parallel Chapters -->
  <path d="M 500 460 L 500 477" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow-purple)" />

  <!-- inside parallel: generate -> validate -->
  <path d="M 390 538 L 417 538" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- inside parallel: validate -> evaluate -->
  <path d="M 580 538 L 607 538" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- inside parallel: evaluate loop back to generate (if fails) -->
  <path d="M 690 515 C 690 465, 310 465, 310 515" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3 3" />

  <!-- Parallel Chapters -> coverage_gate -->
  <path d="M 500 575 L 500 597" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- coverage_gate (gaps loop back to assign_workers) -->
  <path d="M 590 622 L 665 622 L 665 437 L 593 437" fill="none" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="672" y="530" fill="#ef4444" font-size="10" font-weight="600" transform="rotate(90, 672, 530)">Missing Chapters</text>

  <!-- coverage_gate -> assemble_story -->
  <path d="M 500 645 L 500 672" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- assemble_story -> evaluate_story -->
  <path d="M 500 720 L 500 747" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- evaluate_story -> Diamond -->
  <path d="M 500 795 L 500 817" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Diamond - Fail (low quality score) -->
  <path d="M 530 850 L 672 850 L 672 772 L 677 772" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="560" y="842" fill="#ef4444" font-size="10" font-weight="600">Low Score</text>

  <!-- rewrite to evaluate -->
  <path d="M 680 772 L 593 772" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Diamond - Pass -->
  <path d="M 500 880 L 500 912" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="510" y="898" fill="#10b981" font-size="10" font-weight="600">Approved</text>
</svg>
